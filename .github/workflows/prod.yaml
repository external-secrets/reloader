name: Build and Publish new release

on:
  release:
    types: [published]

env:
  GOLANGCI_VERSION: 'v2.10.1'
  KUBERNETES_VERSION: '1.35.x'

permissions:
  contents: read

jobs:
  publish-artifacts:
    uses: ./.github/workflows/publish.yml
    permissions:
      id-token: write
      packages: write
      contents: read
    strategy:
      matrix:
        include:
        - dockerfile: "Dockerfile"
          build-args: "CGO_ENABLED=0"
          build-arch: "amd64 arm64"
          build-platform: "linux/amd64,linux/arm64"
          tag-suffix: "" # distroless
    with:
      dockerfile: ${{ matrix.dockerfile }}
      tag-suffix: ${{ matrix.tag-suffix }}
      image-name: ghcr.io/${{ github.repository }}
      image-tag: ${{ github.event.release.tag_name }}
      build-platform: ${{ matrix.build-platform }}
      build-args: ${{ matrix.build-args }}
      build-arch: ${{ matrix.build-arch }}
      ref: ${{ github.ref }}
      username: ${{ github.actor }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sign:
    permissions:
      id-token: write
      contents: write
      packages: write
    runs-on: ubuntu-latest
    needs: publish-artifacts
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.ref }}
      - name: Build bundle
        run: make bundle
        env:
          IMG: ghcr.io/${{ github.repository }}

      - name: Sign image
        uses: ./.github/actions/sign
        with:
          image-name: ghcr.io/${{ github.repository }}
          image-tag: ${{ github.event.release.tag_name }}

      - name: Update Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            provenance.${{ github.event.release.tag_name }}.intoto.jsonl
            sbom.${{ github.event.release.tag_name }}.spdx.json
            bundle.yaml
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
